<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f5ef" />
    <meta name="description" content="我的哑铃教练 V5-V7 版本实时预览中心" />
    <title>我的哑铃教练 · 版本预览中心</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#preview-stage">跳到预览</a>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="我的哑铃教练版本预览中心">
          <span class="brand-mark" aria-hidden="true">力</span>
          <span>
            <strong>我的哑铃教练</strong>
            <small>版本预览中心</small>
          </span>
        </div>
        <div class="topbar-status">
          <span class="live-dot" aria-hidden="true"></span>
          <span>实时预览</span>
          <span class="topbar-separator" aria-hidden="true"></span>
          <span id="active-version-label">V7 · 当前版本</span>
        </div>
      </header>

      <main class="workspace">
        <aside class="version-rail" aria-labelledby="version-heading">
          <div class="panel-heading">
            <p class="eyebrow">VERSION HISTORY</p>
            <h1 id="version-heading">选择版本</h1>
          </div>
          <div id="version-list" class="version-list" role="list"></div>
          <div class="rail-note">
            <span aria-hidden="true">↻</span>
            <p><strong>以后怎么用</strong><br />每次迭代新增一个版本配置，预览和改动清单会同步出现。</p>
          </div>
        </aside>

        <section id="preview-stage" class="preview-stage" aria-labelledby="preview-title">
          <div class="stage-toolbar">
            <div>
              <p class="eyebrow">INTERACTIVE PREVIEW</p>
              <h2 id="preview-title">手机端实时预览</h2>
            </div>
            <div class="stage-actions">
              <button id="compare-toggle" class="quiet-button" type="button" aria-pressed="true">
                <span class="compare-icon" aria-hidden="true"></span>
                标记本版新增
              </button>
            </div>
          </div>
          <div class="device-stage">
            <div id="phone-preview" class="phone" aria-live="polite"></div>
          </div>
          <p class="stage-hint"><span aria-hidden="true">●</span> 预览可交互：切换底部页面，或点击“拍照记录”查看饮食分析。</p>
        </section>

        <aside class="change-panel" aria-labelledby="changes-heading">
          <div class="change-header">
            <div>
              <p class="eyebrow">WHAT CHANGED</p>
              <h2 id="changes-heading">本版改动</h2>
            </div>
            <span id="change-count" class="count-badge"></span>
          </div>
          <div class="filter-group" aria-label="筛选改动">
            <button class="filter-button is-active" type="button" data-filter="all">全部</button>
            <button class="filter-button" type="button" data-filter="added">只看新增</button>
            <button class="filter-button" type="button" data-filter="improved">优化</button>
          </div>
          <div id="version-summary" class="version-summary"></div>
          <div id="change-list" class="change-list"></div>
        </aside>
      </main>
    </div>

    <noscript>这个预览中心需要启用 JavaScript 才能切换版本和页面。</noscript>
    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
